<main id="main-content">

<section aria-labelledby="contact-heading">

<h2 id="contact-heading">Get In Touch</h2>

<form aria-label="Contact Form">

<div>
<label for="name">Full Name</label>
<input
type="text"
id="name"
name="name"
required
autocomplete="name">
</div>

<div>
<label for="email">Email Address</label>
<input
type="email"
id="email"
name="email"
required
autocomplete="email">
</div>

<div>
<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="5"
required></textarea>
</div>

<button type="submit">
Send Message
</button>

</form>

</section>

</main>
